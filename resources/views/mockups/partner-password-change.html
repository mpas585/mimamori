<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワード変更 - みまもりデバイス（仮）</title>
<style>
:root{--beige:#f5f0e8;--cream:#faf8f4;--white:#fff;--gray-100:#f5f5f5;--gray-200:#e5e5e5;--gray-300:#d4d4d4;--gray-400:#a3a3a3;--gray-500:#737373;--gray-600:#525252;--gray-700:#404040;--gray-800:#262626;--green:#4caf50;--green-dark:#2e7d32;--green-light:#e8f5e9;--red:#ef5350;--radius:8px;--radius-lg:12px;--shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow:0 4px 12px rgba(0,0,0,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--beige);color:var(--gray-800);min-height:100vh}
.nav{background:var(--gray-800);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.nav-brand{font-size:15px;font-weight:700;color:#fff;text-decoration:none}
.nav-link{font-size:13px;color:var(--gray-400);text-decoration:none}
.nav-link:hover{color:#fff}
.main{max-width:600px;margin:0 auto;padding:24px 20px}
.page-title{font-size:18px;font-weight:700;color:var(--gray-800);margin-bottom:24px;text-align:center}
.card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--gray-200);padding:24px;margin-bottom:20px}
.card-title{font-size:15px;font-weight:700;color:var(--gray-800);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.current-value{font-size:13px;color:var(--gray-500);margin-bottom:12px;padding:8px 12px;background:var(--beige);border-radius:var(--radius)}
.current-value strong{color:var(--gray-800)}
.alert{background:#fbe9e7;color:#c62828;border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-bottom:16px}
.alert-success{background:var(--green-light);color:var(--green-dark);border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-bottom:16px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:6px}
.form-input{width:100%;padding:10px 12px;font-size:14px;font-family:inherit;border:1px solid var(--gray-300);border-radius:var(--radius);background:var(--white);color:var(--gray-800)}
.form-input:focus{outline:none;border-color:var(--gray-500)}
.form-hint{font-size:11px;color:var(--gray-400);margin-top:4px}
.form-error{font-size:12px;color:var(--red);margin-top:4px}
.form-actions{margin-top:20px;display:flex;justify-content:flex-end}
.btn-save{padding:10px 24px;font-size:14px;font-weight:600;font-family:inherit;color:#fff;background:var(--gray-800);border:none;border-radius:var(--radius);cursor:pointer}
.btn-save:hover{background:var(--gray-700)}
</style>
</head>
<body>
<nav class="nav">
  <a href="partner.html" class="nav-brand">🧈 みまもりデバイス（仮）</a>
  <div style="display:flex;gap:16px">
    <a href="partner-password-change.html" class="nav-link">🔐 アカウント設定</a>
    <a href="partner-login.html" class="nav-link">ログアウト</a>
  </div>
</nav>
<main class="main">
  <h1 class="page-title">アカウント設定</h1>

  <!-- メールアドレス変更 -->
  <div class="card">
    <div class="card-title">📧 メールアドレス変更</div>
    <div class="current-value">現在のメールアドレス: <strong>admin@example.com</strong></div>
    <div class="form-group">
      <label class="form-label">新しいメールアドレス</label>
      <input type="email" class="form-input" placeholder="example@company.com">
    </div>
    <div class="form-group">
      <label class="form-label">確認用パスワード</label>
      <input type="password" class="form-input" placeholder="現在のパスワード">
      <p class="form-hint">セキュリティのため、パスワードを入力してください</p>
    </div>
    <div class="form-actions">
      <button class="btn-save">メールアドレスを変更</button>
    </div>
  </div>

  <!-- パスワード変更 -->
  <div class="card">
    <div class="card-title">🔐 パスワード変更</div>
    <!-- エラー時 -->
    <div class="alert">現在のパスワードが正しくありません</div>
    <!-- 成功時 -->
    <div class="alert-success">パスワードを変更しました</div>
    <div class="form-group">
      <label class="form-label">現在のパスワード</label>
      <input type="password" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">新しいパスワード</label>
      <input type="password" class="form-input" placeholder="8文字以上">
      <p class="form-hint">8文字以上で入力してください</p>
    </div>
    <div class="form-group">
      <label class="form-label">新しいパスワード（確認）</label>
      <input type="password" class="form-input" placeholder="もう一度入力">
    </div>
    <div class="form-actions">
      <button class="btn-save">パスワードを変更</button>
    </div>
  </div>
</main>
</body>
</html>
